[toolchain]
channel = "stable"
components = [ "rustfmt", "clippy", "rust-src" ]
# rust-src is the stdlib source — not needed to build, but it lets IDEs (which
# get the toolchain from Nix, not rustup) resolve and navigate into std.
# Static target so the Docker image needs no libc closure — just the binary.
# On aarch64 hosts, change this to "aarch64-unknown-linux-musl".
targets = [ "x86_64-unknown-linux-musl" ]
